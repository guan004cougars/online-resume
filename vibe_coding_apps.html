<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding 的应用 | 管开祥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0d14;
            --bg-card: rgba(18, 24, 38, 0.92);
            --bg-card-soft: rgba(23, 31, 49, 0.84);
            --text-primary: #f8fbff;
            --text-secondary: #9aa6bf;
            --text-muted: #6f7a92;
            --line: rgba(139, 170, 255, 0.16);
            --blue: #78a6ff;
            --cyan: #57d7d0;
            --green: #5de6a5;
            --panel: linear-gradient(145deg, rgba(25, 35, 58, 0.98), rgba(14, 19, 31, 0.95));
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans", sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(circle at top left, rgba(120, 166, 255, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(87, 215, 208, 0.14), transparent 24%),
                linear-gradient(180deg, #090c13 0%, #0c1018 100%);
            min-height: 100vh;
        }

        .top-tabs-wrap {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(16px);
            background: rgba(9, 12, 19, 0.78);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .top-tabs {
            max-width: 1440px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
        }

        .top-tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            padding: 10px 16px;
            border-radius: 999px;
            text-decoration: none;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            transition: 0.2s ease;
            font-size: 13px;
            font-weight: 600;
        }

        .top-tab:hover,
        .top-tab.active {
            color: var(--text-primary);
            border-color: rgba(120, 166, 255, 0.28);
            background: rgba(120, 166, 255, 0.12);
        }

        .page-shell {
            max-width: 1440px;
            margin: 0 auto;
            padding: 34px 24px 64px;
        }

        .section {
            margin-top: 8px;
        }

        .section + .section {
            margin-top: 34px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 20px;
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .apps-grid {
            display: grid;
            gap: 20px;
        }

        .app-card {
            display: block;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            padding: 30px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background:
                radial-gradient(circle at 85% 18%, rgba(87, 215, 208, 0.12), transparent 20%),
                radial-gradient(circle at 8% 100%, rgba(120, 166, 255, 0.12), transparent 24%),
                var(--panel);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.24);
            transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
        }

        .app-card:hover {
            transform: translateY(-4px);
            border-color: rgba(120, 166, 255, 0.34);
            box-shadow: 0 28px 54px rgba(0, 0, 0, 0.32);
        }

        .app-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 16px;
        }

        .app-title-wrap {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .app-title-icon {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(120, 166, 255, 0.22), rgba(87, 215, 208, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            color: #e7f1ff;
        }

        .app-title-icon svg {
            width: 34px;
            height: 34px;
        }

        .app-title-copy {
            min-width: 0;
        }

        .app-card h2 {
            font-size: clamp(28px, 4vw, 42px);
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }

        .app-subtitle {
            color: #d2def6;
            font-size: 18px;
            line-height: 1.75;
            margin-bottom: 20px;
            max-width: 960px;
        }

        .app-metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .metric {
            padding: 16px 18px;
            border-radius: 18px;
            background: var(--bg-card-soft);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-value {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #edf4ff;
        }

        .metric-label {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .app-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 152px;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .cta-primary {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: #08111d;
        }

        .cta-secondary {
            border: 1px solid rgba(120, 166, 255, 0.18);
            background: rgba(255, 255, 255, 0.03);
            color: #dce8ff;
        }

        .cta:hover {
            transform: translateY(-1px);
        }

        .detail-page-shell {
            max-width: none;
            padding: 0;
        }

        .detail-frame {
            display: block;
            width: 100%;
            height: calc(100vh - 65px);
            min-height: calc(100vh - 65px);
            border: 0;
            background: transparent;
        }

        @media (max-width: 920px) {
            .page-shell {
                padding: 24px 16px 48px;
            }

            .detail-page-shell {
                padding: 0;
            }

            .app-card {
                padding: 22px;
                border-radius: 22px;
            }

            .app-metrics {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .top-tabs {
                padding: 12px 16px;
            }

            .app-card-header,
            .section-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .app-title-icon {
                width: 60px;
                height: 60px;
                border-radius: 18px;
            }

            .app-metrics {
                grid-template-columns: 1fr;
            }

            .app-subtitle {
                font-size: 16px;
            }

            .app-actions {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="top-tabs-wrap">
        <nav class="top-tabs" aria-label="页面导航">
            <a class="top-tab" href="index.html#resume-home">简历主页</a>
            <a class="top-tab active" href="vibe_coding_apps.html">Vibe Coding的应用</a>
            <a class="top-tab" href="skill_library.html">封装的Skill</a>
        </nav>
    </div>

    <main class="page-shell detail-page-shell">
        <iframe
            class="detail-frame"
            src="vibe_llm_paradigms.html"
            title="LLM 范式平台快速体验详情"
        ></iframe>

        <section class="section" hidden>
            <div class="section-head">
                <div>
                    <div class="section-title">我做的应用</div>
                </div>
            </div>

            <div class="apps-grid">
                <a class="app-card" href="vibe_llm_paradigms.html">
                    <div class="app-card-header">
                        <div class="app-title-wrap">
                            <div class="app-title-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <path d="M12 3 4 7.5v9L12 21l8-4.5v-9L12 3Z"/>
                                    <path d="M12 12 4 7.5"/>
                                    <path d="M12 12l8-4.5"/>
                                    <path d="M12 12v9"/>
                                </svg>
                            </div>
                            <div class="app-title-copy">
                                <h2>LLM 范式平台</h2>
                                <div class="app-subtitle">按「LLM 在产品里扮演什么角色」切分出 <strong>toC 7 种 + toB 7 种</strong> 范式。每张卡片背后是一个<strong>真实调用大模型</strong>的可玩 demo + 一页产品方法论。</div>
                            </div>
                        </div>
                        <div class="app-actions">
                            <span class="cta cta-primary">快速体验</span>
                        </div>
                    </div>

                    <div class="app-metrics">
                        <div class="metric">
                            <div class="metric-value">7</div>
                            <div class="metric-label">C端 LLM 应用范式</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">7</div>
                            <div class="metric-label">B端 LLM 应用范式</div>
                        </div>
                    </div>
                </a>

                <a class="app-card" href="llm-paradigms-app/#/advisor">
                    <div class="app-card-header">
                        <div class="app-title-wrap">
                            <div class="app-title-icon" aria-hidden="true">🧭</div>
                            <div class="app-title-copy">
                                <h2>AI 产品顾问</h2>
                                <div class="app-subtitle">填入你的产品 → 专家诊断 → 推荐范式 → 落地方案 + demo 设想。还能建产品库。</div>
                            </div>
                        </div>
                        <div class="app-actions">
                            <span class="cta cta-primary">咨询 →</span>
                        </div>
                    </div>

                    <div class="app-metrics">
                        <div class="metric">
                            <div class="metric-value">诊断</div>
                            <div class="metric-label">专家视角拆解产品问题</div>
                        </div>
                        <div class="metric">
                            <div class="metric-value">方案</div>
                            <div class="metric-label">推荐范式与 Demo 设想</div>
                        </div>
                    </div>
                </a>
            </div>
        </section>

        <section class="section" hidden>
            <div class="section-head">
                <div>
                    <div class="section-title">我封装的skill</div>
                </div>
            </div>
        </section>

    </main>
    <script>
        const detailFrame = document.querySelector('.detail-frame');

        function resizeDetailFrame() {
            if (!detailFrame?.contentWindow) return;

            try {
                const detailDocument = detailFrame.contentWindow.document;
                const height = Math.max(
                    detailDocument.body.scrollHeight,
                    detailDocument.documentElement.scrollHeight
                );
                detailFrame.style.height = `${height}px`;
            } catch (error) {
                // Keep the viewport-height fallback if the embedded page is not readable.
            }
        }

        detailFrame.addEventListener('load', resizeDetailFrame);
        window.addEventListener('resize', resizeDetailFrame);
    </script>
</body>
</html>
